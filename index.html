    <script>
        function unlockForm() {
            // Smoothly hide the Turnstile widget
            const turnstileGate = document.getElementById('turnstile-container');
            turnstileGate.style.display = 'none';
            
            // Smoothly reveal the Brevo form
            const formWrapper = document.getElementById('brevo-form-wrapper');
            formWrapper.style.display = 'block';
            
            // Adding a small delay for a smooth fade-in effect
            formWrapper.style.opacity = 0;
            setTimeout(() => {
                formWrapper.style.transition = 'opacity 0.5s ease-in-out';
                formWrapper.style.opacity = 1;
            }, 10);
        }
    </script>
