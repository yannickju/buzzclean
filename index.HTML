<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Clean | Pure Clarity</title>
    <style>
        /* Base Reset & Typography */
        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0d0d; /* Dark background */
            color: #ffffff; /* White text */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Container Styling */
        .container {
            max-width: 500px;
            padding: 40px 20px;
        }

        /* Logo Styling */
        .brand-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Premium circular frame */
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(74, 144, 226, 0.2); /* Subtle cool blue glow */
        }

        /* Headings */
        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        h2 {
            font-size: 1.2rem;
            color: #a0a0a0; /* Titanium Gray aesthetic */
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        /* Body Text */
        p {
            font-size: 1.1rem;
            color: #d1d1d1;
            margin-bottom: 0; /* Adjusted since there is no form below it */
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        
        
        <h1>Buzz Clean</h1>
        <h2>Coming Soon</h2>
        
        <p>Stay tuned! Be the first to get 20% off when we launch.</p>
    </div>

</body>
</html>
